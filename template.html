<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    <style>
        
        body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;

        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        font-family: system-ui, sans-serif;
        }

        
        .markdown-body {
        box-sizing: border-box;
        max-width: 900px;
        width: 100%;

        padding: 40px;
        margin: 40px;

        border-radius: 12px;

        background: #0d1117;
        color: #c9d1d9;

        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        
        .markdown-body h1 {
        text-align: center;
        }

        
        .markdown-body img {
        display: block;
        margin: auto;
        border-radius: 10px;
        }

    </style>
</head>

<body>
    <article class="markdown-body">
        $body$
    </article>
</body>

</html>
