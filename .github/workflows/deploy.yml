name: Deploy README to Personal Website

on:
  push:
    branches: [main]
    paths:
      - readme.md
      - template.html
      - .github/workflows/deploy.yml

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert README to HTML
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          pandoc readme.md -s --template=template.html -o index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4